name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Build and Publish to Play Store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Prepare keystore
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/keystore"
          echo "${{ secrets.ENCRYPTED_KEYSTORE }}" > keystore/keystore.asc
          gpg -d --passphrase "${{ secrets.KEYSTORE_PASSPHRASE }}" --batch keystore/keystore.asc > keystore/keystore.jks

      - name: Write keystore properties
        run: |
          {
            echo "keystore_path=${GITHUB_WORKSPACE}/keystore/keystore.jks"
            echo "keystore_password=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keystore_key_alias=${{ secrets.KEYSTORE_KEY_ALIAS }}"
            echo "keystore_key_password=${{ secrets.KEYSTORE_KEY_PASSWORD }}"
          } >> local.properties

      - name: Build release AAB
        env:
          RELEASE_VERSION_NAME: ${{ github.ref_name }}
        run: ./gradlew :app:bundleRelease

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: dev.akexorcist.flipfoldcounter
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: production
          status: draft

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release create "$RELEASE_TAG" --generate-notes --title "$RELEASE_TAG"
